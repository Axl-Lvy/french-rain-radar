name: schema

on:
  pull_request:
    paths: ['schema/**', '.github/workflows/schema.yml']
  push:
    branches: [main]
    paths: ['schema/**', '.github/workflows/schema.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install check-jsonschema
      - run: check-jsonschema --schemafile schema/manifest.schema.json schema/examples/manifest.example.json
