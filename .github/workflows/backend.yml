name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'schema/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'schema/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install libeccodes (GRIB runtime)
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Validate example manifest against schema
        run: uv run check-jsonschema --schemafile ../schema/manifest.schema.json ../schema/examples/manifest.example.json
