name: deploy-backend

# Auto-deploy the backend to the Hetzner VPS after CI passes on main.
# The deploy step SSHs into the VPS and runs `backend/deploy/update.sh`,
# which pulls the new code, re-syncs Python deps, and restarts the timers.

on:
  workflow_run:
    workflows: ["backend"]
    types: [completed]
    branches: [main]
  # Manual redeploy from the Actions tab without making a code change.
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    # On workflow_run: only deploy when the upstream `backend` workflow succeeded.
    # On workflow_dispatch: always deploy (manual operator action).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH into VPS and run update.sh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            sudo /opt/radar/backend/deploy/update.sh
